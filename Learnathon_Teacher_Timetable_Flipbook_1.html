<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learnathon — Daily Teacher Timetable (Flipbook)</title>
<style>
  :root{
    --navy:#2F3C7E; --navy-dk:#232E63; --coral:#F96167; --gold:#F9E795;
    --gold-dk:#E8B923; --cream:#FFF4F0; --lblue:#EEF1FA; --ink:#2B2B3A;
    --muted:#6B7089; --paper:#FFFDF9;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    font-family:'Segoe UI', Calibri, Arial, sans-serif;
    background:radial-gradient(ellipse at 30% 20%, #3A488F 0%, var(--navy-dk) 65%);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:100vh; padding:18px; color:var(--ink); overflow:hidden;
  }
  .bookwrap{position:relative; width:min(1150px, 96vw); aspect-ratio: 1150/700; max-height:82vh;}
  .book{position:absolute; inset:0; perspective:2600px;}
  .page{
    position:absolute; inset:0; transform-origin:left center;
    transform-style:preserve-3d; transition:transform .8s cubic-bezier(.4,.1,.2,1);
    border-radius:6px 14px 14px 6px;
  }
  .page.flipped{transform:rotateY(-180deg);}
  .face{
    position:absolute; inset:0; backface-visibility:hidden; overflow:hidden;
    border-radius:6px 14px 14px 6px;
    background:var(--paper);
    box-shadow:0 10px 40px rgba(0,0,0,.35), inset 12px 0 24px -18px rgba(47,60,126,.35);
    padding:26px 34px;
    display:flex; flex-direction:column;
  }
  .face.back{
    transform:rotateY(180deg);
    background:linear-gradient(135deg, var(--navy) 0%, var(--navy-dk) 100%);
    border-radius:14px 6px 6px 14px;
    box-shadow:0 10px 40px rgba(0,0,0,.35);
    display:flex; align-items:center; justify-content:center;
  }
  .face.back span{color:rgba(255,255,255,.28); font-size:20px; font-weight:700; letter-spacing:4px; transform:rotate(-8deg);}
  /* cover */
  .cover{background:linear-gradient(135deg, var(--navy) 0%, var(--navy-dk) 100%); color:#fff; align-items:flex-start; justify-content:center;}
  .cover .kicker{color:var(--gold); font-weight:800; letter-spacing:5px; font-size:15px; margin-bottom:14px;}
  .cover h1{font-size:clamp(26px,4vw,46px); line-height:1.12; margin-bottom:10px;}
  .cover h1 em{color:var(--gold); font-style:normal;}
  .cover .sub{color:#D9DEF2; font-size:15px; margin-bottom:26px; max-width:60%;}
  .roster{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; width:100%; max-width:820px;}
  .roster div{background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.15); border-radius:10px; padding:10px 14px; font-size:13px;}
  .roster b{display:block; color:var(--gold); font-size:15px; margin-bottom:2px;}
  .cover .hint{margin-top:28px; color:var(--coral); background:#fff; display:inline-block; padding:8px 18px; border-radius:999px; font-weight:700; font-size:13px;}
  /* day pages */
  .dayhead{display:flex; align-items:baseline; gap:14px; margin-bottom:4px;}
  .daynum{background:var(--coral); color:#fff; font-weight:800; border-radius:10px; padding:5px 13px; font-size:16px; white-space:nowrap;}
  .daynum.gold{background:var(--gold-dk);}
  .dayhead h2{color:var(--navy); font-size:clamp(15px,1.9vw,23px);}
  .daysub{color:var(--muted); font-style:italic; font-size:12.5px; margin-bottom:10px;}
  table{width:100%; border-collapse:collapse; table-layout:fixed; flex:1;}
  th{background:var(--navy); color:#fff; font-size:11.5px; padding:6px 6px; text-align:center;}
  th small{display:block; color:#C9D2F0; font-weight:600; font-size:9.5px;}
  th.time{width:8.5%;} th.tch{width:14.8%;} th.eih{width:16.2%;}
  td{border:1px solid #E2E5F0; font-size:10.8px; padding:5px 7px; vertical-align:middle; line-height:1.3; background:#fff;}
  td.time{background:#F5F5F7; color:var(--coral); font-weight:800; text-align:center; font-size:10.5px;}
  td.cream{background:var(--cream);} td.lblue{background:var(--lblue);}
  td.gold{background:#FDF3C7;} td.grey{background:#F5F5F7;}
  td.bold{font-weight:700; color:var(--navy);}
  .pagefoot{margin-top:8px; display:flex; justify-content:space-between; color:var(--muted); font-size:10.5px;}
  /* notes page */
  .notes h2{color:var(--navy); margin-bottom:14px;}
  .notes li{margin:0 0 12px 18px; font-size:13.5px; line-height:1.5;}
  /* controls */
  .controls{display:flex; gap:14px; align-items:center; margin-top:16px; z-index:50;}
  .btn{
    background:var(--coral); border:none; color:#fff; font-weight:800; font-size:14px;
    padding:10px 22px; border-radius:999px; cursor:pointer; box-shadow:0 4px 14px rgba(0,0,0,.3);
  }
  .btn:disabled{opacity:.35; cursor:default;}
  .btn.alt{background:rgba(255,255,255,.14); border:1px solid rgba(255,255,255,.3);}
  .counter{color:#D9DEF2; font-size:13px; min-width:110px; text-align:center;}
  .tabs{display:flex; gap:6px; flex-wrap:wrap; justify-content:center; margin-top:10px; z-index:50; max-width:1000px;}
  .tab{
    background:rgba(255,255,255,.1); color:#D9DEF2; border:1px solid rgba(255,255,255,.18);
    border-radius:999px; padding:4px 12px; font-size:11.5px; cursor:pointer; font-weight:700;
  }
  .tab.active{background:var(--gold); color:var(--navy); border-color:var(--gold);}
</style>
</head>
<body>
  <div class="bookwrap"><div class="book" id="book"></div></div>
  <div class="controls">
    <button class="btn alt" id="prev">← Back</button>
    <div class="counter" id="counter"></div>
    <button class="btn" id="next">Flip →</button>
  </div>
  <div class="tabs" id="tabs"></div>

<script>
const CT = ["Lyba|A1 — Foundation","Mehreen|A2 — Elementary","Barya|B1 — Intermediate","Wajhee|B2 — Upper-Int."];
const EIH = ["Afifa|EIH · A1 + A2","Maeen|EIH · B1 + B2"];

// helper row builders. cells: {t, list:[{txt, span, cls}]}
const four = (txt, cls) => [{txt, span:4, cls}];
const each4 = (txt, cls) => [0,1,2,3].map(()=>({txt, cls}));
const e2 = (txt, cls="gold") => [{txt, cls},{txt, cls}];

function stdRows(s1, s2, exit){
  const r = [];
  r.push({t:"09:00–09:15", c:[...each4("Settling time with own group"), ...e2("Prep: EIH media & room setup")]});
  r.push({t:"09:15–10:15", c:[...each4(s1+" — teach own group"), ...e2("Prep: EIH media & room setup")]});
  r.push({t:"10:15–11:15", c:[...each4(s2+" — teach own group"), ...e2("Final EIH check: audio, video, seating")]});
  r.push({t:"11:15–12:00", c:[...four("Break / prep & marking (classes at EIH)","grey"),
    {txt:"EIH — 'The English Journey' (A1 + A2 combined)", cls:"gold bold"},
    {txt:"EIH — 'The English Journey' (B1 + B2 combined)", cls:"gold bold"}]});
  r.push({t:"12:00–12:45", c:[...four("Refreshment / lunch break — all staff","grey"), ...e2("Lunch","grey")]});
  if(exit){
    r.push({t:"12:45–13:45", c:[...each4("EXIT PLACEMENT — Form B (Listening & Reading, auto-marked) — invigilate own group","cream"), ...e2("On-call support / EIH follow-up & next-day prep")]});
    r.push({t:"13:45–14:45", c:[...each4("EXIT PLACEMENT — short Writing & Speaking + CEFR can-do profile (teacher + self)","cream"), ...e2("On-call support / EIH follow-up & next-day prep")]});
  } else {
    r.push({t:"12:45–13:45", c:[...each4("Revisit & Extend — "+s1.split(" — ")[0]+" (extended Moodle activities)","lblue"), ...e2("On-call support / EIH follow-up & next-day prep")]});
    r.push({t:"13:45–14:45", c:[...each4("Revisit & Extend — "+s2.split(" — ")[0]+" (extended Moodle activities + embedded grammar)","lblue"), ...e2("On-call support / EIH follow-up & next-day prep")]});
  }
  r.push({t:"14:45–15:00", c:[...each4("Reflection & wrap-up — Reflection Portal + portfolio upload"), ...e2("—","grey")]});
  return r;
}

const DAYS = [
  {n:"DAY 1", title:"All About Me: Self, Family & Daily Life",
   sub:"Adaptive Placement + grouping day · Focus: Listening & Speaking · No EIH or revisit blocks",
   rows:[
    {t:"09:00–10:00", c:[...four("Welcome and Adaptive Placement test orientation — welcome learners, walk through test instructions, device & audio checks","cream"), ...e2("Tech support (devices, mic & speaker checks)")]},
    {t:"10:00–11:00", c:[...four("Adaptive Placement test — invigilate assigned room","cream"), ...e2("Tech & invigilation support")]},
    {t:"11:00–12:00", c:[...four("Orientation of the programme — all groups together (all four class teachers co-lead)","cream"), ...e2("Support orientation & help settle learners")]},
    {t:"12:00–12:45", c:[...four("Grouping — CEFR streaming into A1 / A2 / B1 / B2; each teacher collects their group","cream"), ...e2("Assist streaming & room moves")]},
    {t:"12:45–13:30", c:[...four("Break for lunch — all staff","grey"), ...e2("Lunch","grey")]},
    {t:"13:30–14:15", c:[...each4("Listening (L1) — 'Meet-the-Class' audio gallery — teach own group"), ...e2("Prep Day-2 EIH (media setup & run-through)")]},
    {t:"14:15–15:00", c:[...each4("Speaking (S1) — 'My World' 60-second video profile — teach own group"), ...e2("Prep Day-2 EIH / support recording logistics")]},
   ]},
  {n:"DAY 2", title:"My Town & Finding My Way", sub:"CEFR-streamed teaching · Focus: Listening & Speaking",
   rows: stdRows("Listening (L2) — 'Human GPS' listening trail","Speaking (S2) — 'Map-It' directions challenge")},
  {n:"DAY 3", title:"Screen Stories: Audio, Film & Narrative", sub:"CEFR-streamed teaching · Focus: Listening & Speaking",
   rows: stdRows("Listening (L3) — 'Silent-Clip Decode'","Speaking (S3) — 'Story Retell Studio'")},
  {n:"DAY 4", title:"Everyday Messages, Notes & Forms", sub:"CEFR-streamed teaching · Focus: Reading & Writing",
   rows: stdRows("Reading (R4) — 'Inbox Investigation'","Writing (W4) — 'Message & Form Builder'")},
  {n:"DAY 5", title:"Signs, Ads & Finding Information", sub:"CEFR-streamed teaching · Focus: Reading & Writing",
   rows: stdRows("Reading (R5) — 'Signs & Ads Scavenger Hunt'","Writing (W5) — 'Design-an-Advert'")},
  {n:"DAY 6", title:"Reading to Learn Across Subjects", sub:"CEFR-streamed teaching · Focus: Reading & Writing",
   rows: stdRows("Reading (R6) — 'Cross-Subject Reading Lab'","Writing (W6) — 'How-It-Works Explainer'")},
  {n:"DAY 7", title:"Creative Voices: Diaries & Narratives", sub:"CEFR-streamed teaching · Focus: Reading & Writing",
   rows: stdRows("Reading (R7) — 'Story-World Explorer'","Writing (W7) — 'My Digital Diary / Story'")},
  {n:"DAY 8", title:"News & The Wider World", sub:"CEFR-streamed teaching · Focus: Reading & Writing",
   rows: stdRows("Reading (R8) — 'Global Newsroom'","Writing (W8) — 'Newsroom Writing Desk'")},
  {n:"DAY 9", title:"Reviews, Reports & Opinions", sub:"CEFR-streamed teaching · Focus: Reading & Writing",
   rows: stdRows("Reading (R9) — 'Review Radar'","Writing (W9) — 'Opinion & Review Workshop'")},
  {n:"DAY 10", title:"The World of Work & Showcase Prep", sub:"CEFR-streamed teaching · Focus: Reading & Writing · Afternoon = Exit Placement (measures the learning gain)",
   rows: stdRows("Reading (R10) — 'Job Board Explorer'","Writing (W10) — 'Portfolio & Showcase'", true)},
  {n:"DAY 11", title:"Showcase & Celebration", gold:true,
   sub:"All six teachers work together — detailed running order is in the Day-11 Showcase & Celebration Teacher Guide",
   rows:[
    {t:"Morning", c:[...four("Set up showcase space & gallery; final rehearsal with own group; help learners stage their 'All-About-Me' portfolios","cream"), ...e2("Stage, audio & media setup for performances")]},
    {t:"Midday", c:[...four("SHOWCASE — learners present, perform and display; teachers compère their group's slots and cheer everyone on","gold"), ...e2("Run sound & music (incl. English Hour songs)")]},
    {t:"Afternoon", c:[...four("Certificates & Learnathon Star awards; celebration and goodbyes — every learner receives a certificate","cream"), ...e2("Support certificates & celebration")]},
   ]},
];

const NOTES = [
  "EIH (English Immersive Hour), 11:15–12:00 on Days 2–10, is a press-play immersive block with no direct teacher input — Afifa (A1+A2) and Maeen (B1+B2) supervise, manage media and keep the atmosphere relaxed, while the four class teachers take their daily prep/marking break.",
  "On Day 1 there is no EIH: Afifa and Maeen give tech and invigilation support during the Adaptive Placement test (learners need working devices and audio), assist streaming and orientation, then prepare the Day-2 EIH.",
  "Day 1 afternoon: with lunch ending 13:30, the two core-skill blocks run 45 minutes each (13:30–14:15 Listening, 14:15–15:00 Speaking) so the day still finishes at 15:00.",
  "Day 10 afternoon replaces the revisit blocks with the low-stakes Exit Placement (Form B + Writing/Speaking + CEFR can-do profile) — each class teacher invigilates and profiles their own group.",
  "Where 'prep / on-call support' is shown for Afifa and Maeen in the afternoons, the coordinator may redeploy them (e.g. classroom support, portfolio checking, showcase preparation).",
];

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;");}

function dayPageHTML(d){
  let head = `<div class="dayhead"><span class="daynum${d.gold?" gold":""}">${d.n}</span><h2>${esc(d.title)}</h2></div>
  <div class="daysub">${esc(d.sub)}</div>`;
  let thead = `<tr><th class="time">Time</th>` +
    CT.map(x=>{const[a,b]=x.split("|");return `<th class="tch">${a}<small>${b}</small></th>`;}).join("") +
    EIH.map(x=>{const[a,b]=x.split("|");return `<th class="eih">${a}<small>${b}</small></th>`;}).join("") + `</tr>`;
  let rows = d.rows.map(r=>{
    let tds = `<td class="time">${r.t}</td>`;
    r.c.forEach(c=>{ tds += `<td${c.span?` colspan="${c.span}"`:""} class="${c.cls||""}">${esc(c.txt)}</td>`; });
    return `<tr>${tds}</tr>`;
  }).join("");
  return head + `<table><thead>${thead}</thead><tbody>${rows}</tbody></table>
  <div class="pagefoot"><span>LEARNATHON — Daily Teacher Timetable</span><span>09:00–15:00</span></div>`;
}

const pages = [];
// cover
pages.push({tab:"Cover", html:`
  <div class="kicker">LEARNATHON · GRADE 7</div>
  <h1>Daily <em>Teacher</em> Timetable<br>Days 1–11</h1>
  <div class="sub">Accelerated English Language Program · four CEFR-streamed classes + the English Immersive Hour · based on the master 10-day timetable.</div>
  <div class="roster">
    <div><b>Lyba</b>Class Teacher — A1 Foundation</div>
    <div><b>Mehreen</b>Class Teacher — A2 Elementary</div>
    <div><b>Barya</b>Class Teacher — B1 Intermediate</div>
    <div><b>Wajhee</b>Class Teacher — B2 Upper-Int.</div>
    <div><b>Afifa</b>EIH Teacher — A1 + A2 combined</div>
    <div><b>Maeen</b>EIH Teacher — B1 + B2 combined</div>
  </div>
  <div class="hint">Click "Flip →" or use your arrow keys to turn the pages</div>`, cover:true});
// days
DAYS.forEach(d=>pages.push({tab:d.n.replace("DAY ","D"), html:dayPageHTML(d)}));
// notes
pages.push({tab:"Notes", html:`<div class="notes"><div class="dayhead"><span class="daynum gold">NOTES</span><h2>How to read this timetable</h2></div><ul style="margin-top:12px">` +
  NOTES.map(n=>`<li>${esc(n)}</li>`).join("") + `</ul></div>`});

const book = document.getElementById("book");
pages.forEach((p,i)=>{
  const el = document.createElement("div");
  el.className = "page";
  el.style.zIndex = pages.length - i;
  el.innerHTML = `<div class="face front ${p.cover?"cover":""}">${p.html}</div>
                  <div class="face back"><span>LEARNATHON</span></div>`;
  book.appendChild(el);
});

let cur = 0; // number of flipped pages
const els = [...document.querySelectorAll(".page")];
const counter = document.getElementById("counter");
const tabs = document.getElementById("tabs");
pages.forEach((p,i)=>{
  const b = document.createElement("button");
  b.className = "tab"; b.textContent = p.tab;
  b.onclick = ()=>goTo(i);
  tabs.appendChild(b);
});

function render(){
  els.forEach((el,i)=>{
    el.classList.toggle("flipped", i < cur);
    el.style.zIndex = (i < cur) ? i + 1 : pages.length - i;
  });
  counter.textContent = pages[Math.min(cur, pages.length-1)].tab === "Cover" ? "Cover" :
    `Page ${cur} / ${pages.length-1}`;
  [...tabs.children].forEach((t,i)=>t.classList.toggle("active", i===Math.min(cur,pages.length-1)));
  document.getElementById("prev").disabled = cur===0;
  document.getElementById("next").disabled = cur===pages.length-1;
}
function goTo(i){ cur = i; render(); }
document.getElementById("next").onclick = ()=>{ if(cur<pages.length-1){cur++; render();} };
document.getElementById("prev").onclick = ()=>{ if(cur>0){cur--; render();} };
document.addEventListener("keydown",e=>{
  if(e.key==="ArrowRight") document.getElementById("next").click();
  if(e.key==="ArrowLeft") document.getElementById("prev").click();
});
render();
</script>
</body>
</html>
